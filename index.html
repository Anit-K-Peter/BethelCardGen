<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Site Expired</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
      padding: 20px;
    }
    .expired-container {
      text-align: center;
      max-width: 360px;
    }
    .lock-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-icon svg {
      width: 28px;
      height: 28px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #1a1a2e;
    }
    p {
      font-size: 0.85rem;
      line-height: 1.5;
      color: #888;
      margin-bottom: 20px;
    }
    .contact-btn {
      display: inline-block;
      padding: 10px 28px;
      background: #1a1a2e;
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="expired-container">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>This Site Has Expired</h1>
    <p>The website you are trying to reach is currently unavailable because the subscription has expired. Please contact the developer to have it re-enabled.</p>
    <a class="contact-btn" href="https://github.com/Anit-K-Peter" target="_blank">Contact Developer</a>
  </div>
</body>
</html>
